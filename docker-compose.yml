version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ps4
      POSTGRES_PASSWORD: ps4pass
      POSTGRES_DB: ps4_malware
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

volumes:
  pg_data:
